<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anthropocene</title>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@300&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" rel="stylesheet">
<style>
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #ffffff;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  font-family: 'Bitcount Prop Single', monospace;
  user-select: none;
  cursor: default;
}

/* ── Header ── */
#header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 20;
  padding: 36px 48px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  pointer-events: none;
}

#site-title {
  font-size: 14px;
  letter-spacing: 0.45em;
  color: #000;
  font-weight: 300;
  text-transform: uppercase;
  line-height: 1;
}

#site-sub {
  font-size: 12px;
  letter-spacing: 0.25em;
  color: #aaa;
  text-transform: uppercase;
  margin-top: 8px;
}

#hint {
  font-size: 12px;
  letter-spacing: 0.2em;
  color: #ccc;
  text-transform: uppercase;
  text-align: right;
  line-height: 1.8;
}

/* ── Scene ── */
#scene {
  width: 100vw;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

#sphere {
  position: absolute;
  left: 50%;
  top: 50%;
  width: 0;
  height: 0;
}

/* ── Image cards ── */
.img-card {
  position: absolute;
  width: 130px;
  height: 90px;
  cursor: pointer;
  overflow: hidden;
  transform-origin: center center;
  will-change: transform, opacity;
}

.img-card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0);
  transition: background 0.3s ease;
}

.img-card:hover::after {
  background: rgba(0, 0, 0, 0.06);
}

.img-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  filter: grayscale(15%) brightness(0.97);
  transition: filter 0.4s ease, transform 0.4s ease;
  pointer-events: none;
}

.img-card:hover img {
  filter: grayscale(0%) brightness(1);
  transform: scale(1.04);
}

/* Placeholder when image fails */
.img-card .placeholder {
  width: 100%;
  height: 100%;
  background: #0a0a0a;
  display: flex;
  align-items: center;
  justify-content: center;
}

.img-card .placeholder span {
  font-size: 12px;
  letter-spacing: 0.2em;
  color: #333;
  text-transform: uppercase;
}

/* ── Lightbox ── */
#lightbox {
  position: fixed;
  inset: 0;
  z-index: 100;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: rgba(255, 255, 255, 0.97);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
}

#lightbox.active {
  opacity: 1;
  pointer-events: all;
}

#lightbox-img-wrap {
  position: relative;
  max-width: 68vw;
  max-height: 68vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

#lightbox-img {
  max-width: 68vw;
  max-height: 68vh;
  object-fit: contain;
  display: block;
  transform: scale(0.96);
  transition: transform 0.5s ease;
}

#lightbox.active #lightbox-img {
  transform: scale(1);
}

#lightbox-meta {
  margin-top: 36px;
  text-align: center;
}

#lightbox-title {
  font-size: 14px;
  letter-spacing: 0.5em;
  color: #000;
  text-transform: uppercase;
  font-weight: 300;
}


/* ── Lightbox description ── */
#lightbox-desc {
  margin-top: 28px;
  max-width: 560px;
  text-align: center;
  font-family: 'Pretendard', sans-serif;
  font-weight: 500;
  display: none;
}

#lightbox-desc-ko {
  font-size: 13px;
  line-height: 1.9;
  color: #111;
  white-space: pre-line;
  margin: 0 0 14px 0;
}

#lightbox-desc-en {
  font-size: 12px;
  line-height: 1.9;
  color: #555;
  white-space: pre-line;
  margin: 0;
}

/* ── List label ── */
#sphere {
  overflow: visible;
}

.img-label {
  position: absolute;
  text-align: center;
  font-size: 12px;
  letter-spacing: 0.35em;
  color: #000;
  text-transform: uppercase;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transform: translateX(-50%);
}

/* ── Overlay canvas ── */
#overlay-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 5;
}

/* ── Drag cursor ── */
body.dragging {
  cursor: grabbing;
}
</style>
</head>

// ── Config ──────────────────────────────────────────────
const RADIUS        = 178;    // sphere radius in px
const FOCAL         = 700;    // perspective focal length
const AUTO_SPEED    = 0.03;   // degrees per frame (auto rotation)
const DRAG_FACTOR   = 0.28;   // mouse drag sensitivity
const MAX_R_ADD     = 40;     // max extra radius on fast drag
const R_SMOOTH      = 0.08;   // radius lerp factor
const ROT_SMOOTH    = 0.88;   // momentum decay
const CARD_W        = 65;
const CARD_H        = 45;
const LIST_W        = 360;                          // list mode card width (native px)
const LIST_H        = Math.round(LIST_W * CARD_H / CARD_W); // ≈248, keeps aspect ratio
const LIST_ITEM_H   = LIST_H + 72;                 // image height + title gap
const LIST_START_Y  = -(LIST_H / 2 + 60);          // first item slightly above center

// ── DOM refs ────────────────────────────────────────────
const sphere      = document.getElementById('sphere');
const scene       = document.getElementById('scene');
const lightbox    = document.getElementById('lightbox');
const lbImg       = document.getElementById('lightbox-img');
const lbTitle     = document.getElementById('lightbox-title');
const lbDesc      = document.getElementById('lightbox-desc');
const lbDescKo    = document.getElementById('lightbox-desc-ko');
const lbDescEn    = document.getElementById('lightbox-desc-en');

// ── State ────────────────────────────────────────────────
let angleX = -10, angleY = 0;  // degrees
let velX = 0, velY = 0;
let isDragging  = false;
let isHovering  = false;
let autoRotate  = true;
let lbIndex     = 0;
let currentR    = RADIUS;
let targetR     = RADIUS;
let zoomT           = 0;
let targetZoomT     = 0;
let listScrollY     = 0;
let targetListScrollY = 0;
let lastMouseX  = 0;
let lastMouseY  = 0;
let lastDX = 0, lastDY = 0;

// ── Random sphere positions (seeded, minimum-distance enforced) ──
const N = IMAGES.length;

// Seeded LCG random — same layout on every load
let _seed = 137;
function rand() {
  _seed = (_seed * 1664525 + 1013904223) & 0x7fffffff;
  return _seed / 0x7fffffff;
}

function randomOnSphere() {
  const u     = rand() * 2 - 1;
  const theta = rand() * Math.PI * 2;
  const r     = Math.sqrt(Math.max(0, 1 - u * u));
  return { x: r * Math.cos(theta), y: u, z: r * Math.sin(theta) };
}

// Minimum dot-product threshold — cos(28°) ≈ 0.883, suits 25 images
const MIN_DOT = 0.883;

// Avoid poles: |y| must be < 0.92
const MAX_POLE_Y = 0.92;

const basePoints = [];
let attempts = 0;

while (basePoints.length < N && attempts < 80000) {
  attempts++;
  const p = randomOnSphere();
  if (Math.abs(p.y) > MAX_POLE_Y) continue;
  const tooClose = basePoints.some(q =>
    p.x * q.x + p.y * q.y + p.z * q.z > MIN_DOT
  );
  if (!tooClose) basePoints.push(p);
}

// Fallback: fill remaining with looser constraint to avoid stuck-at-center cards
while (basePoints.length < N) {
  const p = randomOnSphere();
  const tooClose = basePoints.some(q =>
    p.x * q.x + p.y * q.y + p.z * q.z > 0.97
  );
  if (!tooClose) basePoints.push(p);
}

// ── Build card elements ──────────────────────────────────
const cards = IMAGES.map((imgData, i) => {
  const card = document.createElement('div');
  card.className = 'img-card';
  card.style.width  = CARD_W + 'px';
  card.style.height = CARD_H + 'px';

  const img = document.createElement('img');
  img.src = imgData.src;
  img.alt = imgData.title;

  img.onerror = () => {
    img.style.display = 'none';
    const ph = document.createElement('div');
    ph.className = 'placeholder';
    ph.innerHTML = `<span>${imgData.series}</span>`;
    card.appendChild(ph);
  };

  card.appendChild(img);
  card.addEventListener('mouseenter', () => { isHovering = true; });
  card.addEventListener('mouseleave', () => { isHovering = false; });
  card.addEventListener('click', () => {
    if (Math.abs(lastDX) > 4 || Math.abs(lastDY) > 4) return;
    openLightbox(i);
  });

  const label = document.createElement('div');
  label.className = 'img-label';
  label.textContent = imgData.title;

  sphere.appendChild(card);
  sphere.appendChild(label);
  return { card, label };
});

// ── 3D rotation helper ───────────────────────────────────
function rotatePoint(p, axDeg, ayDeg) {
  const ax = axDeg * Math.PI / 180;
  const ay = ayDeg * Math.PI / 180;

  // Rotate around Y axis
  const cosY = Math.cos(ay), sinY = Math.sin(ay);
  const x1 =  p.x * cosY + p.z * sinY;
  const z1 = -p.x * sinY + p.z * cosY;
  const y1 =  p.y;

  // Rotate around X axis
  const cosX = Math.cos(ax), sinX = Math.sin(ax);
  const y2 = y1 * cosX - z1 * sinX;
  const z2 = y1 * sinX + z1 * cosX;

  return { x: x1, y: y2, z: z2 };
}

// ── Lightbox ─────────────────────────────────────────────
function openLightbox(index) {
  lbIndex = ((index % N) + N) % N;
  const d = IMAGES[lbIndex];
  lbImg.src  = d.src;
  lbImg.alt  = d.title;
  lbTitle.textContent = d.title;
  if (d.descKo) {
    lbDescKo.textContent = d.descKo;
    lbDescEn.textContent = d.descEn || '';
    lbDesc.style.display = 'block';
  } else {
    lbDesc.style.display = 'none';
  }
  lightbox.classList.add('active');
  autoRotate = false;
  window.parent.postMessage('lightbox:open', '*');
}

function closeLightbox() {
  lightbox.classList.remove('active');
  autoRotate = true;
  window.parent.postMessage('lightbox:close', '*');
}

lightbox.addEventListener('click', closeLightbox);

document.addEventListener('keydown', (e) => {
  if (!lightbox.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
});

// ── Mouse drag ───────────────────────────────────────────
scene.addEventListener('mousedown', (e) => {
  isDragging = true;
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
  lastDX = 0; lastDY = 0;
  velX = 0; velY = 0;
  document.body.classList.add('dragging');
});

window.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  lastDX = e.clientX - lastMouseX;
  lastDY = e.clientY - lastMouseY;
  velY += lastDX * DRAG_FACTOR;
  velX -= lastDY * DRAG_FACTOR;
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
  const speed = Math.sqrt(lastDX * lastDX + lastDY * lastDY);
  targetR = RADIUS + Math.min(speed * 1.5, MAX_R_ADD);
});

window.addEventListener('mouseup', () => {
  isDragging = false;
  targetR = RADIUS;
  document.body.classList.remove('dragging');
  setTimeout(() => { if (!isDragging && !isHovering) autoRotate = true; }, 800);
});

// ── Mouse wheel: 부모에서 postMessage로 전달받은 wheel 처리 ──
function handleWheel(deltaY) {
  const inList = targetZoomT >= 1;
  const atTop  = targetListScrollY <= 0;
  const maxScroll = Math.max(0, LIST_START_Y + (N - 1) * LIST_ITEM_H + LIST_H / 2 + 100);

  if (!inList) {
    targetZoomT += deltaY * 0.0012;
    targetZoomT = Math.max(0, Math.min(1, targetZoomT));
  } else if (deltaY < 0 && atTop) {
    targetZoomT += deltaY * 0.0012;
    targetZoomT = Math.max(0, targetZoomT);
    if (targetZoomT < 1) targetListScrollY = 0;
  } else {
    targetListScrollY += deltaY * 0.6;
    targetListScrollY = Math.max(0, Math.min(maxScroll, targetListScrollY));
  }
}

// 직접 wheel (standalone) + postMessage (iframe) 모두 지원
window.addEventListener('wheel', (e) => {
  e.preventDefault();
  handleWheel(e.deltaY);
}, { passive: false });

window.addEventListener('message', (e) => {
  if (e.data && e.data.type === 'wheel') handleWheel(e.data.deltaY);
});

// ── Touch drag ───────────────────────────────────────────
let lastTX = 0, lastTY = 0;

scene.addEventListener('touchstart', (e) => {
  isDragging = true;
  lastTX = e.touches[0].clientX;
  lastTY = e.touches[0].clientY;
  velX = 0; velY = 0;
}, { passive: true });

window.addEventListener('touchmove', (e) => {
  if (!isDragging) return;
  const dx = e.touches[0].clientX - lastTX;
  const dy = e.touches[0].clientY - lastTY;
  velY += dx * DRAG_FACTOR;
  velX -= dy * DRAG_FACTOR;
  lastTX = e.touches[0].clientX;
  lastTY = e.touches[0].clientY;
  const speed = Math.sqrt(dx * dx + dy * dy);
  targetR = RADIUS + Math.min(speed * 1.5, MAX_R_ADD);
}, { passive: true });

window.addEventListener('touchend', () => {
  isDragging = false;
  targetR = RADIUS;
  setTimeout(() => { if (!isDragging) autoRotate = true; }, 800);
});

// ── Render loop ───────────────────────────────────────────
function tick() {
  if (autoRotate && !isDragging && !isHovering) {
    velY -= AUTO_SPEED;
  }

  angleY += velY;
  angleX += velX;
  velX *= ROT_SMOOTH;
  velY *= ROT_SMOOTH;
  angleX = Math.max(-85, Math.min(85, angleX));

  // Smooth drag radius, zoom, list scroll
  currentR    += (targetR           - currentR)    * R_SMOOTH;
  zoomT       += (targetZoomT       - zoomT)       * 0.06;
  listScrollY += (targetListScrollY - listScrollY) * 0.10;

  // Ease-in-out for smoother transition
  const t = zoomT < 0.5
    ? 2 * zoomT * zoomT
    : 1 - Math.pow(-2 * zoomT + 2, 2) / 2;

  // Slight sphere expansion during transition only
  const R_z = currentR * (1 + (1 - t) * zoomT * 0.4);

  // Card size: interpolate element dimensions (no CSS scale → no pixelation)
  const cardW = CARD_W + t * (LIST_W - CARD_W);
  const cardH = CARD_H + t * (LIST_H - CARD_H);

  // Project all points
  const projected = basePoints.map((p, i) => {
    const r = rotatePoint(p, angleX, angleY);

    // Sphere position with perspective
    const dz = FOCAL - r.z * R_z;
    const perspScale = dz > 0 ? FOCAL / dz : 1;
    const sphX = r.x * R_z * perspScale;
    const sphY = r.y * R_z * perspScale;

    // List position (finite, no wrap)
    const lstX = 0;
    const lstY = LIST_START_Y + i * LIST_ITEM_H - listScrollY;

    // Lerp positions
    const finalX = sphX * (1 - t) + lstX * t;
    const finalY = sphY * (1 - t) + lstY * t;

    // Depth-based scale only in sphere mode (element size handles list mode)
    const finalTransformScale = perspScale * (1 - t) + 1.0 * t;

    return { i, finalX, finalY, finalTransformScale, z: r.z };
  });

  // Sphere: sort by depth; list: sort by Y (top to bottom)
  projected.sort((a, b) => t < 0.5 ? a.z - b.z : a.finalY - b.finalY);

  projected.forEach(({ i, finalX, finalY, finalTransformScale, z }, order) => {
    const { card, label } = cards[i];
    card.style.display  = '';
    card.style.width    = cardW + 'px';
    card.style.height   = cardH + 'px';

    const depthOpacity = 0.3 + 0.7 * ((z + 1) / 2);
    const opacity      = depthOpacity * (1 - t) + 1.0 * t;
    card.style.left      = finalX + 'px';
    card.style.top       = finalY + 'px';
    card.style.transform = `translate(-50%, -50%) scale(${finalTransformScale})`;
    card.style.opacity   = opacity.toFixed(3);
    card.style.zIndex    = order;

    // Label: below card, fades in with list mode
    const labelY = finalY + (cardH * finalTransformScale) / 2 + 12;
    label.style.left    = finalX + 'px';
    label.style.top     = labelY + 'px';
    label.style.opacity = t.toFixed(3);
    label.style.zIndex  = order;
  });

  // ── Draw overlay (axis, meridian, equator) ──────────────
  const canvas = document.getElementById('overlay-canvas');
  const ctx    = canvas.getContext('2d');
  if (canvas.width !== window.innerWidth || canvas.height !== window.innerHeight) {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  const cx = canvas.width  / 2;
  const cy = canvas.height / 2;

  function proj(nx, ny, nz) {
    const r  = rotatePoint({ x: nx, y: ny, z: nz }, angleX, angleY);
    const dz = FOCAL - r.z * R_z;
    const ps = dz > 0 ? FOCAL / dz : FOCAL / Math.abs(dz);
    const fs = ps * (1 - zoomT) + 1.0 * zoomT;
    return { x: cx + r.x * R_z * fs, y: cy + r.y * R_z * fs, z: r.z };
  }

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.globalAlpha = 1 - t;
  ctx.strokeStyle = '#000';
  ctx.lineWidth   = 0.2;
  ctx.lineCap     = 'round';

  const STEPS = 72;

  // Central meridian — solid, great circle in YZ plane
  ctx.setLineDash([]);
  ctx.beginPath();
  for (let i = 0; i <= STEPS; i++) {
    const t = (i / STEPS) * Math.PI * 2;
    const p = proj(0, Math.cos(t), Math.sin(t));
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();

  // Equator — solid, great circle in XZ plane
  ctx.beginPath();
  for (let i = 0; i <= STEPS; i++) {
    const t = (i / STEPS) * Math.PI * 2;
    const p = proj(Math.cos(t), 0, Math.sin(t));
    i === 0 ? ctx.moveTo(p.x, p.y) : ctx.lineTo(p.x, p.y);
  }
  ctx.stroke();

  // Rotation axis — dashed (parametric), poles extended slightly beyond sphere
  ctx.beginPath();
  for (let i = 0; i < STEPS; i++) {
    if (i % 2 !== 0) continue;
    const y0 = -1.35 + (i       / STEPS) * 2.7;
    const y1 = -1.35 + ((i + 1) / STEPS) * 2.7;
    const p0 = proj(0, y0, 0);
    const p1 = proj(0, y1, 0);
    ctx.moveTo(p0.x, p0.y);
    ctx.lineTo(p1.x, p1.y);
  }
  ctx.stroke();
  ctx.globalAlpha = 1;

  requestAnimationFrame(tick);
}

tick();
</script>
</body>
</html>
