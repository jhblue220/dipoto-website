<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Junghyun Kim</title>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Single:wght@300&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.min.css" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #fff;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
  user-select: none;
}

/* ── 메인 랜딩 ── */
#landing {
  width: 100%;
  height: 100%;
  display: flex;
  transition: opacity 0.4s ease;
}

#landing.hidden {
  opacity: 0;
  pointer-events: none;
}

#left {
  width: 75%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}

#right {
  width: 25%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  justify-content: center;
  gap: 14px;
}

#name {
  font-family: 'Pretendard', sans-serif;
  font-weight: 700;
  font-size: clamp(32px, 5vw, 64px);
  letter-spacing: 0.1em;
  color: #000;
  text-transform: uppercase;
}

.link {
  display: block;
  width: 100%;
  text-decoration: none;
  cursor: pointer;
  position: relative;
  padding: 4px 0 4px 4px;
  overflow: hidden;
}

.link::before {
  content: '';
  position: absolute;
  inset: 0;
  background: #000;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.77, 0, 0.18, 1);
  z-index: 0;
}

.link:hover::before {
  transform: translateX(0%);
}

.link span {
  position: relative;
  z-index: 1;
  transition: color 0.4s cubic-bezier(0.77, 0, 0.18, 1);
}

.link:hover span {
  color: #fff;
}

#link-anthropocene {
  font-family: 'Bitcount Prop Single', monospace;
  font-weight: 300;
  font-size: 17px;
  letter-spacing: 0.04em;
  color: #000;
  text-transform: uppercase;
}

#link-archive {
  font-family: 'Nanum Myeongjo', serif;
  font-size: 17px;
  letter-spacing: 0.25em;
  color: #000;
}

/* ── iframe 뷰 ── */
#viewer {
  position: fixed;
  inset: 0;
  z-index: 10;
  /* pointer-events none — landing 클릭 가능하게 */
  pointer-events: none;
}

/* 두 iframe 모두 항상 display:block (innerWidth/Height 정상 계산) */
#viewer iframe {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  border: none;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.35s ease;
}

/* 활성 iframe만 보이고 클릭 가능 */
#viewer iframe.active {
  opacity: 1;
  pointer-events: all;
}

/* ── 뒤로가기 버튼 ── */
#back {
  position: fixed;
  top: 32px;
  left: 36px;
  z-index: 20;
  font-family: 'Pretendard', sans-serif;
  font-size: 11px;
  letter-spacing: 0.3em;
  color: #fff;
  mix-blend-mode: difference;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  text-transform: uppercase;
  background: none;
  border: none;
}

#back.active {
  opacity: 1;
  pointer-events: all;
}

#back:hover { opacity: 0.5; }
</style>
</head>
<body>

<div id="landing">
  <div id="left">
    <div id="name">Junghyun Kim</div>
  </div>
  <div id="right">
    <a class="link" id="link-anthropocene" onclick="openSite('anthropocene')"><span>Anthropocene</span></a>
    <a class="link" id="link-archive" onclick="openSite('archive')"><span>이력서</span></a>
  </div>
</div>

<div id="viewer">
  <iframe id="frame-anthropocene" src="anthropocene/index.html"></iframe>
  <iframe id="frame-archive"      src="archive/index.html"></iframe>
</div>

<button id="back" onclick="closeSite()">← Back</button>

<script>
const landing = document.getElementById('landing');
const back    = document.getElementById('back');
const frames  = {
  anthropocene: document.getElementById('frame-anthropocene'),
  archive:      document.getElementById('frame-archive'),
};

function openSite(key) {
  // 다른 iframe 비활성화
  Object.values(frames).forEach(f => f.classList.remove('active'));
  // 선택한 iframe 활성화
  frames[key].classList.add('active');
  landing.classList.add('hidden');
  back.classList.add('active');
}

function closeSite() {
  Object.values(frames).forEach(f => f.classList.remove('active'));
  landing.classList.remove('hidden');
  back.classList.remove('active');
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape' && back.classList.contains('active')) closeSite();
});
</script>

</body>
</html>
